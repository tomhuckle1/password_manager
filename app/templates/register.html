{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5">
    <div class="card shadow-sm vault-card">
      <div class="card-body p-4">
        <div class="d-flex align-items-center gap-2 mb-3">
          <span class="vault-logo"><i class="bi bi-person-plus-fill"></i></span>
          <h3 class="mb-0">Register</h3>
        </div>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input class="form-control" type="text" name="name" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input class="form-control" type="email" name="email" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input class="form-control" type="password" name="password" required>
            </div>
            <div class="form-text mt-2" id="passwordRequirements">
                <div id="req-length" class="text-danger">At least 8 characters</div>
                <div id="req-upper" class="text-danger">One uppercase letter</div>
                <div id="req-lower" class="text-danger">One lowercase letter</div>
                <div id="req-number" class="text-danger">One number</div>
                <div id="req-symbol" class="text-danger">One symbol</div>
            </div>
         </div>     

         <div class="mt-2">
            <div class="progress" style="height:6px;">
              <div id="passwordStrengthBar" class="progress-bar" role="progressbar"></div>
            </div>
            <small id="passwordStrengthText" class="form-text text-muted"></small>
          </div>

          <div class="mb-3">
            <label class="form-label">Confirm password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input class="form-control" type="password" name="confirm" required>
            </div>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="is_admin" id="is_admin">
            <label class="form-check-label" for="is_admin">
              Register as admin
            </label>
          </div>

          <button class="btn btn-dark w-100" type="submit">
            <i class="bi bi-check2-circle me-1"></i> Create account
          </button>
        </form>

        <div class="mt-3 text-center">
          <span class="text-muted">Already registered?</span>
          <a href="{{ url_for('auth.login') }}">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
