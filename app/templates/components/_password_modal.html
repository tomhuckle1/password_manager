<!-- Modal -->
<div class="modal fade" id="entryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-fullscreen-sm-down">
    <div class="modal-content vault-modal">

      <div class="modal-header">
        <div class="me-2" style="min-width: 0;">
          <h5 class="modal-title mb-0 text-truncate" id="modalTitle">
            Password
          </h5>
          <div class="text-muted small text-truncate" id="modalWebsiteHeader"></div>
        </div>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close">
        </button>
      </div>

      <div class="modal-body">
        <div class="row g-3">

          <!-- Username -->
          <div class="col-12 col-md-6">
            <label class="form-label text-muted small mb-1">
              Username
            </label>
            <div class="d-flex align-items-center gap-2">
              <div class="font-monospace flex-grow-1 text-truncate"
                   id="modalUsername">
              </div>
              <button class="btn btn-sm btn-outline-secondary flex-shrink-0"
                      type="button"
                      id="modalCopyUsername"
                      title="Copy username">
                <i class="bi bi-person"></i>
              </button>
            </div>
          </div>

          <!-- Password -->
          <div class="col-12 col-md-6">
            <label class="form-label text-muted small mb-1">
              Password
            </label>
            <div class="d-flex align-items-center gap-2">
              <div class="font-monospace flex-grow-1 text-truncate"
                   id="modalPasswordMasked">
                ••••••••••
              </div>
              <button class="btn btn-sm btn-outline-secondary flex-shrink-0"
                      type="button"
                      id="modalTogglePassword"
                      title="Show/Hide password">
                <i class="bi bi-eye"></i>
              </button>
              <button class="btn btn-sm btn-outline-secondary flex-shrink-0"
                      type="button"
                      id="modalCopyPassword"
                      title="Copy password">
                <i class="bi bi-clipboard"></i>
              </button>
            </div>
          </div>

          <!-- Website -->
          <div class="col-12">
            <label class="form-label text-muted small mb-1">
              Website
            </label>
            <div class="d-flex align-items-center gap-2">
              <div class="text-truncate flex-grow-1"
                   id="modalWebsite">
              </div>
              <button class="btn btn-sm btn-outline-secondary flex-shrink-0"
                      type="button"
                      id="modalCopyUrl"
                      title="Copy URL">
                <i class="bi bi-link-45deg"></i>
              </button>
            </div>
          </div>

          <!-- Notes -->
          <div class="col-12">
            <label class="form-label text-muted small mb-1">
              Notes
            </label>
            <div class="border rounded-3 p-3 bg-light"
                 id="modalNotes">
              <span class="text-muted">No notes available.</span>
            </div>
          </div>

          <!-- Metadata -->
          <div class="col-12">
            <div class="d-flex flex-wrap gap-3 text-muted small">
              <div>
                <i class="bi bi-clock-history me-1"></i>
                Updated: <span id="modalUpdated"></span>
              </div>
              <div>
                <i class="bi bi-calendar2-plus me-1"></i>
                Created: <span id="modalCreated"></span>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Footer -->
      <div class="modal-footer d-flex justify-content-end gap-2">

        <a class="btn btn-outline-primary btn-sm"
          id="modalEditBtn"
          href="#">
          <i class="bi bi-pencil-square me-1"></i>
          Edit
        </a>

        <!-- Delete triggers extra confirm -->
        <button class="btn btn-outline-danger btn-sm"
                type="button"
                id="modalDeleteBtn"
                data-bs-toggle="modal"
                data-bs-target="#confirmDeleteModal">
          <i class="bi bi-trash3 me-1"></i>
          Delete
        </button>

        <button class="btn btn-dark btn-sm"
                type="button"
                data-bs-dismiss="modal">
          Close
        </button>

      </div>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-sm">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-exclamation-triangle me-2 text-danger"></i>
          Confirm delete
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div class="mb-2 fw-semibold">Are you sure you want to delete this password?</div>
        <div class="text-muted small">This action cannot be undone.</div>
      </div>

      <div class="modal-footer d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
          Cancel
        </button>

        <!-- Actual delete -->
        <form method="POST" id="modalDeleteForm" class="m-0">
          <button type="submit" class="btn btn-danger btn-sm">
            <i class="bi bi-trash3 me-1"></i>
            Confirm delete
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
